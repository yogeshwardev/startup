version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  runner:
    build:
      context: .
      dockerfile: docker/runner/Dockerfile
    image: campusarena-runner:latest
    command: ["sh", "-c", "echo runner image ready && tail -f /dev/null"]

volumes:
  mongo_data:
